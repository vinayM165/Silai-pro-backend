services:
  - type: web
    name: silai-pro-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free

    # Health check path for Render to know the app is alive
    healthCheckPath: /actuator/health

    envVars:
      # ── Database ──
      # Set the actual value in the Render dashboard (under "Environment" tab)
      - key: SPRING_DATASOURCE_URL
        sync: false  # marks as required; you fill in the value on Render

      - key: SPRING_DATASOURCE_USERNAME
        sync: false

      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

      # ── JWT ──
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value!

      # ── Spring Profile ──
      - key: SPRING_PROFILES_ACTIVE
        value: prod
