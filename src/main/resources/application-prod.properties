# Aiven MySQL - Production Database (Externalized with Fallbacks)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://placeholder-only:3306/defaultdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:placeholder_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:placeholder_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Do NOT run schema.sql in prod (JPA handles table creation via entities)
spring.sql.init.mode=never

# JWT Secret
jwt.secret=${JWT_SECRET:SilaiProDefaultSecretKeyForInitialDeploymentOnly}
